# GoReleaser configuration for openclaw-sdk-go
# This is a library project, so the focus is on Go module distribution
# rather than binary distribution.

version: 2

project_name: openclaw-sdk-go

# Before hooks
before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...

# Go module verification (critical for library projects)
gomod:
  proxy: true
  mod: mod

# Skip build, as this's a library project
builds:
  skip: true

# Snapshots (for testing)
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Release configuration
release:
  prerelease: auto
  mode: replace
  replace_existing_artifacts: true
