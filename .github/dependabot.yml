version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - "i0r3k"
    groups:
      actions-deps:
        patterns:
          - "*"
  # Maintain dependencies for golang
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    assignees:
      - "i0r3k"
